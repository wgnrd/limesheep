<table class="table table-bordered">
  <thead>
    <tr>
      <th class="col-xs-2">#</th>
      <th class="col-xs-1">RI</th>
      <th class="col-xs-1">RII</th>
      <th class="col-xs-1">SI</th>
      <th class="col-xs-1">Wiener</th>
      <th class="col-xs-1">Spe</th>
      <th class="col-xs-1">Eis</th>
      <th class="col-xs-1">Brat</th>
      <th class="col-xs-1">Käse</th>
      <th class="col-xs-1">Göd</th>
      <th class="col-xs-1">Ges</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let sausage of sausages; let i = index">
      <th scope="row">{{ sausage.name }}</th>
      <td>
        <input
          type="number"
          class="form-control"
          [(ngModel)]="sausage.ingredients[0]"
          (input)="onZtChanged($event, i, 0)"
          [readOnly]="sausage.recipe[0] == 0"
        />
      </td>
      <td>
        <input
          type="number"
          class="form-control"
          [(ngModel)]="sausage.ingredients[1]"
          (input)="onZtChanged($event, i, 1)"
          [readOnly]="sausage.recipe[1] == 0"
        />
      </td>
      <td>
        <input
          type="number"
          class="form-control"
          [(ngModel)]="sausage.ingredients[2]"
          (input)="onZtChanged($event, i, 2)"
          [readOnly]="sausage.recipe[2] == 0"
        />
      </td>
      <td>
        <input
          type="number"
          class="form-control"
          [(ngModel)]="sausage.ingredients[3]"
          (input)="onZtChanged($event, i, 3)"
          [readOnly]="sausage.recipe[3] == 0"
        />
      </td>
      <td>
        <input
          type="number"
          class="form-control"
          [(ngModel)]="sausage.ingredients[4]"
          (input)="onZtChanged($event, i, 4)"
          [readOnly]="sausage.recipe[4] == 0"
        />
      </td>
      <td>
        <input
          type="number"
          class="form-control"
          [(ngModel)]="sausage.ingredients[5]"
          (input)="onZtChanged($event, i, 5)"
          [readOnly]="sausage.recipe[5] == 0"
        />
      </td>
      <td>
        <input
          type="number"
          class="form-control"
          [(ngModel)]="sausage.ingredients[6]"
          (input)="onZtChanged($event, i, 6)"
          [readOnly]="sausage.recipe[6] == 0"
        />
      </td>
      <td>
        <input
          type="number"
          class="form-control"
          [(ngModel)]="sausage.ingredients[7]"
          (input)="onZtChanged($event, i, 7)"
          [readOnly]="sausage.recipe[7] == 0"
        />
      </td>
      <td>
        <input
          type="number"
          class="form-control"
          [(ngModel)]="sausage.ingredients[8]"
          (input)="onZtChanged($event, i, 8)"
          [readOnly]="sausage.recipe[8] == 0"
        />
      </td>
      <td>
        <input
          type="number"
          class="form-control"
          [(ngModel)]="sausage.sum"
          (input)="onSumChanged($event, i)"
        />
      </td>
    </tr>
    <tr>
      <th scope="row">Gesamt</th>
      <td *ngFor="let item of columnSum; let i = index">
        <input
          type="number"
          class="form-control readable"
          [(ngModel)]="columnSum[i]"
          readonly
        />
      </td>
    </tr>
  </tbody>
</table>

<button (click)="printTable()" class="btn btn-primary">Drucken</button>
<iframe
  name="print_frame"
  width="0"
  height="0"
  frameborder="0"
  src="about:blank"
></iframe>
